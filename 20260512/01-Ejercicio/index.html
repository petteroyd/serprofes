<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fichas Técnicas</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>

    <div class="tarjeta">
        <h2>🛒 Productos</h2>
        <p>
            <span class="etiqueta">Nombre:</span>
            <span id="prod_nombre">---</span>
        </p>

        <p>
            <span class="etiqueta">Precio:</span>
            <span id="prod_precio">---</span> €
        </p>

        <p>
            <span class="etiqueta">Categorias:</span>
            <span id="prod_cat">---</span>
        </p>

    </div>

    <div class="tarjeta">
        <h2>🎓 Mi Ficha</h2>
        <p>
            <span class="etiqueta">Alumno:</span>
            <span id="alum_nombre">---</span>
        </p>

        <p>
            <span class="etiqueta">Edad:</span>
            <span id="alum_edad">---</span>
        </p>

        <p>
            <span class="etiqueta">Ciudad:</span>
            <span id="alum_ciudad">---</span>
        </p>
        <button onclick="mostrar_mi_ficha()">Generar mi ficha</button>
        
    </div>

</body>

</html>
