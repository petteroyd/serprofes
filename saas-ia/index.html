<!DOCTYPE html>
<html lang="es">

    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Mi IA SaaS - Panel de Control</title>
        <link rel="stylesheet" href="style.css" />
        <!-- Realcionamos con el fichero app.js defer para que cargue junto al html -->
        <script src="app.js" defer></script>
    </head>   

    <body>
    <div class="app-container">
            <aside class="sidebar">
                
                <div class="logo-area">
                    <h2>IA Master</h2>
                </div>
                
                <nav class="menu-lateral">
                    <button>+ Nuevo Chat</button>
                    <div class="historial">
                        <p>Historia reciente ...</p>
                        <ul>
                            <li>¿Cómo hacer dieta?</li>
                            <li>Receta de pizza</li>
                        </ul>
                    </div>
                
                </nav>
                <div class="perfil">
                    <span>Usuario Pro</span>
                </div>
            </aside>

            <main class="chat-area">
                <header class="chat-header">
                    <h3>Conversación Actual</h3>
                </header>
                <section class="mensajes-container">
                    <div class="mensaje-ia">¡Hola! ¿En qué puedo ayudarte hoy?</div>
                </section>
                
                <footer class="input-area">
                    <!-- Evento Form se añade la función enviarPrompt -->
                    <form class="chat-form" onsubmit="enviarPrompt(event)">
                        <!-- Añadir ID -->
                        <input type="text" id="mensaje-input" placeholder="Escribe tu pregunta aqui ...">
                        <!-- Añadir tipo submit -->
                        <button type="submit" >Enviar</button>
                    </form>
                </footer>
            </main>
        </div>
    </body>

</html>
