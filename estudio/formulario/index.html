<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <section class="formulario">
        <div class="form-card">
            <h1>Resgistrate ahora</h1>
                <form>
                    <div class="nombre">
                        <label>Nombre de Usuario</label>
                        <input type="text" placeholder="Jhon Doe">
                    </div>
                    <div class="nombre">
                        <label>Alias</label>
                        <input type="text" placeholder="doomboy">
                    </div>
                    <div class="nombre">
                        <label>Email</label>
                        <input type="email" placeholder="Jhon@gmail.com">
                    </div>
                    <div class="nombre">
                        <label>Contraseña</label>
                        <input type="password" placeholder="******">
                    </div>
                    <button class="btn_summit">Iniciar seción</button>
                </form>
                <p class="login">
                    Listo para usar tu cuenta? <a href="#">Iniciar sesión</a>
                </p>
        </div>
    </section>
</body>

</html>
